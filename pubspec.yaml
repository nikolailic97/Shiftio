name: shiftio
description: Shiftio - Modern Shift Management App
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.1
  firebase_auth: ^4.19.4
  cloud_firestore: ^4.17.2
  firebase_messaging: ^14.9.2
  firebase_storage: ^11.7.4

  # Local notifications
  flutter_local_notifications: ^17.2.2

  # State Management
  provider: ^6.1.2

  # Local Storage
  shared_preferences: ^2.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Biometrics
  local_auth: ^2.1.8

  # Connectivity
  connectivity_plus: ^5.0.2

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  intl: ^0.19.0

  # Export
  excel: ^4.0.6
  path_provider: ^2.1.3
  open_filex: ^4.3.4
  share_plus: ^9.0.0

  # RevenueCat
  purchases_flutter: ^8.11.0
  purchases_ui_flutter: ^8.11.0

  # Utils
  uuid: ^4.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.9
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_logo_bg.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_logo_bg.png"
